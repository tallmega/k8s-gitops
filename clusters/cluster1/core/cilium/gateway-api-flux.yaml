---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway-api-upstream
  namespace: flux-system
spec:
  interval: 24h0m0s
  ref:
    semver: ">=1.5.1 <1.6.0"
  url: https://github.com/kubernetes-sigs/gateway-api
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 24h0m0s
  path: ./config/crd/standard
  patches:
  # Temporary compat shim: Cilium 1.19.3 still initializes TLSRoute via v1alpha2.
  # Remove this once the cluster moves to a Cilium release that consumes TLSRoute v1.
  - patch: |
      - op: replace
        path: /spec/versions/1/served
        value: true
    target:
      kind: CustomResourceDefinition
      name: tlsroutes.gateway.networking.k8s.io
  prune: true
  sourceRef:
    kind: GitRepository
    name: gateway-api-upstream
  timeout: 5m0s
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium-gateway-api
  namespace: flux-system
spec:
  dependsOn:
  - name: gateway-api-crds
  interval: 10m0s
  path: ./manifests/cluster1/gateway-api
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  wait: true
