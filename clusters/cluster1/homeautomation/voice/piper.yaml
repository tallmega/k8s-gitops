apiVersion: apps/v1
kind: Deployment
metadata:
  name: piper
  namespace: default
spec:
  selector:
    matchLabels:
      app: piper
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: piper
    spec:
      containers:
      - env:
        - name: TZ
          value: America/Toronto
        imagePullPolicy: IfNotPresent
        name: piper-k8s
        image: rhasspy/wyoming-piper:2.2.2 # {"$imagepolicy": "flux-system:piper"}
        args:
        - --voice=en_GB-cori-medium
        - --update-voices
        ports:
        - containerPort: 10200
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 128Mi
          limits:
            cpu: "2"
            memory: 1Gi
        volumeMounts:
        - mountPath: /data
          name: piper-data
      hostname: piper
      volumes:
      - name: piper-data
        persistentVolumeClaim:
          claimName: piper-config-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: piper
  namespace: default
  labels:
    app: piper
  annotations:
    lbipam.cilium.io/ips: 10.10.10.71
    lbipam.cilium.io/sharing-key: wyoming-svc
spec:
  ports:
  - name: piper-10200
    port: 10200
    protocol: TCP
    targetPort: 10200
  selector:
    app: piper
  externalTrafficPolicy: Cluster
  type: LoadBalancer
