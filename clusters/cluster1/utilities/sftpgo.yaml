apiVersion: apps/v1
kind: Deployment
metadata:
  name: sftpgo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sftpgo
  strategy:
    rollingUpdate: null
    type: Recreate
  template:
    metadata:
      labels:
        app: sftpgo
    spec:
      containers:
        - name: sftpgo
          image: drakkan/sftpgo:v2.7.1 # {"$imagepolicy": "flux-system:sftpgo"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
            - name: ssh
              containerPort: 2022
            - name: ftp
              containerPort: 2121
            - name: webdav
              containerPort: 10080
          env:
            - name: TZ
              value: America/Toronto
            - name: SFTPGO_WEBDAVD__BINDINGS__0__PORT
              value: "10080"
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: sftpgodata
              mountPath: /srv/sftpgo/data
            - name: sftpgohome
              mountPath: /var/lib/sftpgo
      volumes:
        - name: sftpgodata
          persistentVolumeClaim:
            claimName: uploads-pvc
        - name: sftpgohome
          persistentVolumeClaim:
            claimName: sftpgo-config-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sftpgo-httpdav
  namespace: default
  labels:
    app: sftpgo
spec:
  selector:
    app: sftpgo
  ports:
  - name: sftpgo-http
    port: 8080
    targetPort: 8080
  - name: webdav
    port: 10080
    targetPort: 10080
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: uploads-pv
spec:
  storageClassName: syno-nfs
  capacity:
    storage: 17Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - hard
    - nfsvers=4
  nfs:
    server: 10.10.10.110
    path: "/volume1/uploads"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: syno-nfs
  volumeName: uploads-pv
  resources:
    requests:
      storage: 8Gi
