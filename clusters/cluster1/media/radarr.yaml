apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: default
spec:
  replicas: 1
  strategy:
    rollingUpdate: null
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
      - name: radarr
        image: linuxserver/radarr:6.1.1 # {"$imagepolicy": "flux-system:radarr"}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7878
        env:
        - name: PGID
          value: "1001"
        - name: PUID
          value: "1001"
        - name: TZ
          value: America/Toronto
        resources:
          requests:
            cpu: 5m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 4Gi
        volumeMounts:
        - name: radarr-config1
          mountPath: /config
        - name: radarr-movies3-nfs
          mountPath: /movies3
          #mountPropagation: Bidirectional
        - name: radarr-downloads-complete
          mountPath: /downloads
      volumes:
      - name: radarr-config1
        persistentVolumeClaim:
          claimName: radarr-config-pvc
      - name: radarr-movies3-nfs
        persistentVolumeClaim:
          claimName: movies3-pvc
      - name: radarr-downloads-complete
        persistentVolumeClaim:
          claimName: downloads-complete-pvc