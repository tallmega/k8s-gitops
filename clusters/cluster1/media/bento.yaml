apiVersion: apps/v1
kind: Deployment
metadata:
  name: bento
  namespace: default
spec:
  replicas: 1
  strategy:
    rollingUpdate: null
    type: Recreate
  selector:
    matchLabels:
      app: bento
  template:
    metadata:
      labels:
        app: bento
    spec:
      containers:
      - name: bento
        image: ghcr.io/alam00000/bentopdf:1.16.1 # {"$imagepolicy": "flux-system:bento"}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bento
  namespace: default
  labels:
    app: bento
spec:
  selector:
    app: bento
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP