apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: karakeep-http-redirect
  namespace: default
spec:
  hostnames:
  - karakeep.tallflix.ca
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: public-gateway
    namespace: gateway-system
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: karakeep-https
  namespace: default
spec:
  hostnames:
  - karakeep.tallflix.ca
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: public-gateway
    namespace: gateway-system
    sectionName: https
  rules:
  - backendRefs:
    - name: karakeep-web
      port: 3000
    matches:
    - path:
        type: PathPrefix
        value: /
