apiVersion: v1
kind: Namespace
metadata:
  name: gateway-system
  labels:
    managed-by: flux
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tallflix-wildcard
  namespace: gateway-system
spec:
  commonName: "*.tallflix.ca"
  dnsNames:
  - "*.tallflix.ca"
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns01
  secretName: tallflix-wildcard-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tallflix-root
  namespace: gateway-system
spec:
  commonName: tallflix.ca
  dnsNames:
  - tallflix.ca
  - www.tallflix.ca
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns01
  secretName: tallflix-root-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: gateway-system
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      # Cutover target: reclaim the legacy public ingress VIP.
      metallb.io/loadBalancerIPs: 10.10.10.60
  listeners:
  - allowedRoutes:
      namespaces:
        from: All
    hostname: "*.tallflix.ca"
    name: http
    port: 80
    protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    hostname: "*.tallflix.ca"
    name: https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - name: tallflix-wildcard-tls
  - allowedRoutes:
      namespaces:
        from: All
    hostname: tallflix.ca
    name: http-root
    port: 80
    protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    hostname: tallflix.ca
    name: https-root
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - name: tallflix-root-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal-gateway
  namespace: gateway-system
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      # Cutover target: reclaim the legacy internal ingress VIP.
      metallb.io/loadBalancerIPs: 10.10.10.65
  listeners:
  - allowedRoutes:
      namespaces:
        from: All
    hostname: "*.tallflix.ca"
    name: http
    port: 80
    protocol: HTTP
  - allowedRoutes:
      namespaces:
        from: All
    hostname: "*.tallflix.ca"
    name: https
    port: 443
    protocol: HTTPS
    tls:
      certificateRefs:
      - name: tallflix-wildcard-tls
